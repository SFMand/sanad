services:
  app:
    build: .
    command: ["python", "app.py"]
    environment:
      GEMINI_API_KEY: ${GEMINI_API_KEY}
      COURSE_DB_PATH: /data/course_planner.db
    volumes:
      - course_db:/data
    ports:
      - "5000"

  admin:
    build: .
    command: ["python", "admin_app.py"]
    environment:
      COURSE_DB_PATH: /data/course_planner.db
    volumes:
      - course_db:/data
    ports:
      - "5050"

volumes:
  course_db:
